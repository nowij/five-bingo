spring:
  application:
    name: five-bingo
  datasource:
    url: jdbc:h2:mem:bingodb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
#  data:
#    redis:
#      host: localhost
#      port: 6379

jwt:
  secret: bingo-game-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24 hours

game:
  daily-limit: 5

server:
  port: 8080

admin:
  username: admin       # 원하는 아이디로 변경
  password: admin1234   # 원하는 비밀번호로 변경
  nickname: 방장         # 원하는 닉네임으로 변경